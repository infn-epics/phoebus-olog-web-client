name: Create and publish Docker image

on:
  push:
  workflow_dispatch:
    inputs:
      docker_target:
        description: 'Docker build target (nginx-server or node-server)'
        required: false
        default: 'nginx-server'
        type: choice
        options:
          - nginx-server
          - node-server

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3.5.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker target and tags
        id: set-target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ inputs.docker_target }}"
          else
            TARGET="nginx-server"
          fi
          
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          
          # nginx-server gets 'latest' tag, node-server gets 'node-server' tag
          if [ "$TARGET" = "node-server" ]; then
            echo "latest-tag=node-server" >> $GITHUB_OUTPUT
          else
            echo "latest-tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=${{ steps.set-target.outputs.latest-tag }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          push: true
          target: ${{ steps.set-target.outputs.target }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2.4.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
